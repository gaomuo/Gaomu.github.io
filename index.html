<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Gaomu's Personal Homepage" />
    <meta name="author" content="gaomuo" />
    <title id="title"></title>

    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Bootstrap CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,400;1,400&family=Mulish:ital,wght@0,300;0,500;0,600;0,700;1,300;1,500;1,600;1,700&family=Newsreader:ital,wght@0,600;1,600&display=swap" rel="stylesheet" />
    <!-- Custom CSS -->
    <link type="text/css" href="static/css/main.css" rel="stylesheet" />

    <!-- Bootstrap JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Marked (Markdown parser) -->
    <script defer src="static/js/marked.min.js"></script>
    <!-- YAML parser -->
    <script defer src="static/js/js-yaml.min.js"></script>
    <!-- Particles -->
    <script defer src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <!-- Core -->
    <script defer src="static/js/scripts.js"></script>

    <!-- MathJax (lazy) -->
    <script>
        MathJax = { tex: { inlineMath: [['$','$'],['\\(','\\)']], displayMath: [['$$','$$'],['\\[','\\]']], processEscapes: false, processEnvironments: true, processRefs: true, tags: 'all', tagSide: 'right', tagIndent: '0.8em', useLabelIds: true, maxMacros: 10000, maxBuffer: 5*1024, formatError: (jax, err) => jax.formatError(err) } };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>

<body id="page-top" class="site-loading">
    <div id="page-skeleton" class="page-skeleton" aria-hidden="true">
        <div class="skeleton-section skeleton-section-light">
            <div class="container px-5">
                <div class="skeleton-block skeleton-section-title"></div>
                <div class="skeleton-block skeleton-line skeleton-line-long"></div>
                <div class="skeleton-block skeleton-line"></div>
                <div class="skeleton-block skeleton-line skeleton-line-short"></div>
            </div>
        </div>
        <div class="skeleton-section skeleton-section-gray">
            <div class="container px-5">
                <div class="skeleton-block skeleton-section-title"></div>
                <div class="skeleton-block skeleton-line skeleton-line-long"></div>
                <div class="skeleton-block skeleton-line"></div>
                <div class="skeleton-block skeleton-line skeleton-line-short"></div>
            </div>
        </div>
    </div>

    <!-- Navigation-->
    <nav class="header navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav">
        <div class="container px-5">
            <a id="page-top-title" class="navbar-brand fw-bold" href="#page-top">&nbsp;</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                MENU
                <i class="bi-list"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul id="navbar-items" class="navbar-nav ms-auto me-4 my-3 my-lg-0"></ul>
            </div>
        </div>
    </nav>

    <section class="top-section" id="top-section">
        <div class="top-section-bg top-section-bg-active" aria-hidden="true"></div>
        <div class="top-section-bg" aria-hidden="true"></div>
        <div id="particles-js" aria-hidden="true"></div>
        <div class="top-section-content">
            <div class="container px-5">
                <h2 id="top-section-bg-text" class="text-white display-3 lh-1 font-alt"></h2>
            </div>
        </div>
    </section>

    <!-- Avatar -->
    <div class="container px-5">
        <div id="avatar">
            <img src="static/assets/img/photo.png" alt="Gaomu">
        </div>
    </div>
    
    <main id="sections"></main>


    <!-- Footer -->
    <footer class="bg-bottom text-center py-5">
        <div class="container px-5">
            <div class="small" style="color:rgba(255,255,255,0.55);">
                <div id="copyright-text" class="mb-2"></div>
                <a id="github-link" href="https://github.com/gaomuo">Github</a>
                <span class="mx-1">&middot;</span>
                <a id="license-link" href="https://github.com/gaomuo/gaomuo.github.io/blob/main/LICENSE">License</a>
            </div>
        </div>
    </footer>

<div id="lightbox" class="lightbox-overlay" aria-hidden="true">
    <span class="lightbox-close">&times;</span>
    <img class="lightbox-img" src="" alt="">
</div>

</body>

</html>
